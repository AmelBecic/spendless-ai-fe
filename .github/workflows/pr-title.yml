name: PR title
# Enforce that every PR title starts with the Jira ticket key (e.g. "SLAI-24 ...")
# so the AI code reviewer can pull the ticket's acceptance criteria for context.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Require the Jira project key prefix
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Prefer the exact key from .claude/project.json; fall back to a generic
          # Jira-key shape if the config is absent or still a placeholder.
          KEY=$(node -e "try{const k=require('./.claude/project.json').jiraKey; if(k&&k!=='FIXME')process.stdout.write(k)}catch{}" 2>/dev/null || true)
          if [ -n "$KEY" ]; then
            PATTERN="^${KEY}-[0-9]+([ :]|\$)"
            HINT="${KEY}-123 <summary>"
          else
            PATTERN='^[A-Z][A-Z0-9]+-[0-9]+([ :]|$)'
            HINT="ABC-123 <summary>"
          fi
          echo "PR title : $TITLE"
          echo "Pattern  : $PATTERN"
          if printf '%s' "$TITLE" | grep -qE "$PATTERN"; then
            echo "✓ PR title starts with the Jira ticket key"
          else
            echo "✗ PR title must start with the Jira ticket key, e.g. '$HINT'"
            exit 1
          fi
